<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GRX 회원 키오스크</title>
<style>
  :root{
    --bg:#000000;
    --panel:#0e0e0e;
    --panel2:#161616;
    --line:#262626;
    --line2:#333333;
    --white:#ffffff;
    --muted:#9a9a9a;
    --muted2:#6a6a6a;
    --lime:#9bd13a;
    --lime-dk:#6f9a1f;
    --red:#e24b4a;
    --amber:#efb02a;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    background:var(--bg);
    color:var(--white);
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    -webkit-font-smoothing:antialiased;
    user-select:none;
    overflow:hidden;
  }
  #app{height:100vh;width:100vw;display:flex;flex-direction:column;}

  /* ===== shared ===== */
  .hidden{display:none !important;}
  .logo{display:block;}
  .lime{color:var(--lime);}

  /* ===== KIOSK ===== */
  .kiosk{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;}
  .kiosk-grid{
    width:100%;max-width:1100px;display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:center;
  }
  .k-left{display:flex;flex-direction:column;align-items:flex-start;gap:18px;padding-left:8px;}
  .k-left img{width:340px;max-width:70vw;height:auto;}
  .k-tag{font-size:15px;letter-spacing:3px;color:var(--lime);font-weight:600;}
  .k-title{font-size:34px;font-weight:800;line-height:1.15;margin:4px 0 0;}
  .k-sub{font-size:17px;color:var(--muted);line-height:1.5;}
  .k-hint{font-size:14px;color:var(--muted2);}

  /* keypad */
  .keypad-wrap{
    background:var(--panel);border:1px solid var(--line);border-radius:28px;padding:26px;max-width:420px;justify-self:center;width:100%;
  }
  .display{
    background:var(--panel2);border:1px solid var(--line);border-radius:18px;height:84px;
    display:flex;align-items:center;justify-content:center;gap:18px;margin-bottom:22px;
  }
  .dot{
    width:50px;height:4px;border-radius:2px;background:var(--line2);transition:background .15s,transform .15s;
  }
  .dot.filled{background:var(--lime);transform:scaleY(2.2);}
  .keys{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
  .key{
    background:var(--panel2);border:1px solid var(--line);border-radius:18px;height:74px;
    font-size:30px;font-weight:600;color:var(--white);display:flex;align-items:center;justify-content:center;
    cursor:pointer;transition:transform .06s,background .12s,border-color .12s;
  }
  .key:active{transform:scale(.94);background:#1d1d1d;border-color:var(--line2);}
  .key.util{font-size:24px;color:var(--muted);}
  .key.util:active{color:var(--white);}
  .submit{
    margin-top:14px;width:100%;height:68px;border:none;border-radius:18px;background:var(--lime);
    color:#0b0b0b;font-size:22px;font-weight:800;cursor:pointer;transition:transform .06s,background .12s,opacity .12s;
    font-family:inherit;
  }
  .submit:active{transform:scale(.98);}
  .submit:disabled{opacity:.4;cursor:default;}

  /* result overlay */
  .result{
    position:fixed;inset:0;background:rgba(0,0,0,.92);display:flex;align-items:center;justify-content:center;
    z-index:50;padding:24px;backdrop-filter:blur(4px);
  }
  .card{
    width:100%;max-width:440px;background:var(--panel);border:1px solid var(--line);border-radius:28px;
    padding:36px 32px;text-align:center;animation:pop .25s ease;
  }
  @keyframes pop{from{transform:scale(.92);opacity:0;}to{transform:scale(1);opacity:1;}}
  .r-name{font-size:30px;font-weight:800;margin:0 0 4px;}
  .r-plan{font-size:16px;color:var(--lime);font-weight:600;margin-bottom:26px;letter-spacing:.5px;}
  .r-big{font-size:72px;font-weight:800;line-height:1;margin:8px 0;}
  .r-big .unit{font-size:26px;font-weight:600;color:var(--muted);margin-left:4px;}
  .r-meta{font-size:15px;color:var(--muted);margin-top:18px;line-height:1.7;}
  .r-status{
    display:inline-block;margin:18px 0 0;padding:9px 20px;border-radius:999px;font-size:15px;font-weight:700;
  }
  .s-ok{background:rgba(155,209,58,.14);color:var(--lime);}
  .s-warn{background:rgba(239,176,42,.16);color:var(--amber);}
  .s-exp{background:rgba(226,75,74,.16);color:var(--red);}
  .r-bar{height:8px;border-radius:4px;background:var(--line);overflow:hidden;margin-top:22px;}
  .r-bar > i{display:block;height:100%;border-radius:4px;background:var(--lime);}
  .r-close{margin-top:26px;font-size:14px;color:var(--muted2);}
  .r-notfound .r-big{font-size:34px;color:var(--red);}

  /* admin gear */
  .gear{
    position:fixed;top:16px;right:18px;width:42px;height:42px;border-radius:12px;border:1px solid var(--line);
    background:var(--panel);color:var(--muted2);display:flex;align-items:center;justify-content:center;
    font-size:20px;cursor:pointer;z-index:40;
  }
  .gear:active{background:var(--panel2);}

  /* ===== ADMIN ===== */
  .admin{flex:1;display:flex;flex-direction:column;overflow:hidden;}
  .a-top{
    display:flex;align-items:center;justify-content:space-between;padding:16px 22px;border-bottom:1px solid var(--line);
    background:var(--panel);
  }
  .a-top h1{font-size:20px;margin:0;font-weight:800;letter-spacing:.5px;}
  .a-top h1 span{color:var(--lime);}
  .sync-dot{display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--lime);margin-left:6px;vertical-align:middle;}
  .sync-dot.ok{background:var(--lime);box-shadow:0 0 6px rgba(155,209,58,.6);}
  .sync-dot.sync{background:var(--amber);animation:pulse 1s infinite;}
  .sync-dot.err{background:var(--red);}
  .sync-dot.off{background:var(--muted2);}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
  .a-back{
    background:none;border:1px solid var(--line);color:var(--muted);border-radius:10px;padding:9px 16px;
    font-size:14px;cursor:pointer;font-family:inherit;
  }
  .a-back:active{background:var(--panel2);color:var(--white);}
  .a-body{flex:1;overflow-y:auto;padding:22px;display:grid;grid-template-columns:380px 1fr;gap:24px;align-items:start;-webkit-overflow-scrolling:touch;}
  @media(max-width:860px) and (min-width:681px){.a-body{grid-template-columns:1fr;}}

  .form{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:22px;}
  .form h2{font-size:16px;margin:0 0 18px;font-weight:700;}
  .field{margin-bottom:16px;}
  .field label{display:block;font-size:13px;color:var(--muted);margin-bottom:7px;}
  .field input,.field select{
    width:100%;height:48px;background:var(--panel2);border:1px solid var(--line);border-radius:12px;
    color:var(--white);font-size:16px;padding:0 14px;font-family:inherit;outline:none;
  }
  .field input:focus,.field select:focus{border-color:var(--lime);}
  .field select{appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%239a9a9a' stroke-width='2'><path d='M6 9l6 6 6-6'/></svg>");background-repeat:no-repeat;background-position:right 14px center;padding-right:38px;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .seg{display:flex;gap:8px;}
  .seg button{
    flex:1;height:44px;background:var(--panel2);border:1px solid var(--line);border-radius:12px;color:var(--muted);
    font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;
  }
  .seg button.on{background:var(--lime);border-color:var(--lime);color:#0b0b0b;}
  .btn-primary{
    width:100%;height:52px;border:none;border-radius:14px;background:var(--lime);color:#0b0b0b;
    font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;margin-top:6px;
  }
  .btn-primary:active{transform:scale(.99);}

  .list-wrap{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:18px 18px 8px;}
  .list-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .list-head h2{font-size:16px;margin:0;font-weight:700;}
  .count{font-size:13px;color:var(--muted);}
  .search{
    width:100%;height:44px;background:var(--panel2);border:1px solid var(--line);border-radius:12px;color:var(--white);
    font-size:15px;padding:0 14px;margin-bottom:14px;font-family:inherit;outline:none;
  }
  .search:focus{border-color:var(--lime);}
  table{width:100%;border-collapse:collapse;}
  th{font-size:12px;color:var(--muted2);text-align:left;font-weight:600;padding:8px 10px;border-bottom:1px solid var(--line);}
  td{font-size:14px;padding:12px 10px;border-bottom:1px solid var(--line);vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  .m-name{font-weight:700;}
  .m-phone{color:var(--muted);font-size:13px;}
  .pill{display:inline-block;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:700;}
  .p-ok{background:rgba(155,209,58,.14);color:var(--lime);}
  .p-warn{background:rgba(239,176,42,.16);color:var(--amber);}
  .p-exp{background:rgba(226,75,74,.16);color:var(--red);}
  .act{display:flex;gap:8px;}
  .act button{background:var(--panel2);border:1px solid var(--line);border-radius:9px;color:var(--muted);
    width:34px;height:34px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;}
  .act button:active{background:#1d1d1d;color:var(--white);}
  .act .del:active{color:var(--red);border-color:var(--red);}
  .empty{text-align:center;color:var(--muted2);padding:40px 0;font-size:14px;}

  /* admin gate */
  .gate{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:60;}
  .gate .keypad-wrap{max-width:340px;}
  .gate-title{text-align:center;font-size:18px;font-weight:700;margin-bottom:18px;}
  .toast{
    position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:var(--lime);color:#0b0b0b;
    padding:13px 26px;border-radius:999px;font-weight:700;font-size:15px;z-index:80;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px);}
  .loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:15px;z-index:90;background:var(--bg);}

  /* ===== TABLET PORTRAIT / smaller landscape ===== */
  @media(max-width:1000px){
    .kiosk-grid{gap:32px;}
    .k-left img{width:280px;}
    .k-title{font-size:30px;}
  }

  /* ===== PHONE (portrait) ===== */
  @media(max-width:680px){
    .kiosk{padding:18px 16px;align-items:flex-start;overflow-y:auto;}
    .kiosk-grid{grid-template-columns:1fr;gap:22px;max-width:440px;margin:0 auto;}
    .k-left{align-items:center;text-align:center;padding-left:0;gap:10px;margin-top:8px;}
    .k-left img{width:200px;}
    .k-title{font-size:26px;}
    .k-sub{font-size:15px;}
    .k-hint{font-size:13px;}
    .keypad-wrap{padding:20px;border-radius:24px;max-width:440px;}
    .display{height:72px;margin-bottom:18px;}
    .dot{width:42px;}
    .keys{gap:12px;}
    .key{height:64px;font-size:26px;border-radius:16px;}
    .submit{height:60px;font-size:20px;}

    /* result card */
    .result{padding:16px;}
    .card{padding:30px 22px;border-radius:24px;}
    .r-name{font-size:26px;}
    .r-big{font-size:60px;}

    /* gear bigger tap target on phone */
    .gear{top:12px;right:12px;width:46px;height:46px;font-size:22px;}

    /* ===== ADMIN on phone ===== */
    .a-top{padding:14px 16px;position:sticky;top:0;z-index:5;}
    .a-top h1{font-size:18px;}
    .a-back{padding:10px 14px;font-size:14px;}
    .a-body{grid-template-columns:1fr;gap:18px;padding:16px;}
    .form,.list-wrap{border-radius:18px;padding:18px 16px;}
    .form h2,.list-head h2{font-size:17px;}
    .field{margin-bottom:18px;}
    .field label{font-size:14px;margin-bottom:9px;}
    .field input,.field select{height:54px;font-size:17px;border-radius:14px;padding:0 16px;}
    .field select{background-position:right 16px center;}
    .row2{grid-template-columns:1fr 1fr;gap:12px;}
    .seg button{height:52px;font-size:15px;border-radius:14px;}
    .btn-primary{height:58px;font-size:17px;border-radius:16px;margin-top:8px;}

    /* member list -> card rows instead of cramped table */
    .search{height:52px;font-size:16px;}
    table,thead,tbody,th,td,tr{display:block;}
    thead{display:none;}
    tbody tr{
      border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:12px;
      display:grid;grid-template-columns:1fr auto;grid-template-areas:"who status" "plan plan" "left act";gap:10px 12px;align-items:center;
    }
    tbody tr td{border:none;padding:0;}
    tbody tr td:nth-child(1){grid-area:who;}
    tbody tr td:nth-child(2){grid-area:plan;color:var(--muted);font-size:14px;}
    tbody tr td:nth-child(3){grid-area:left;font-size:18px;}
    tbody tr td:nth-child(4){grid-area:status;text-align:right;}
    tbody tr td:nth-child(5){grid-area:act;}
    .m-name{font-size:17px;}
    .act{justify-content:flex-end;}
    .act button{width:42px;height:42px;font-size:17px;border-radius:11px;}
  }

  /* very small phones */
  @media(max-width:380px){
    .key{height:58px;font-size:24px;}
    .k-left img{width:170px;}
  }

  @media(max-width:680px){
    body{overflow:auto;}
    #app{height:auto;min-height:100vh;}
    .admin{min-height:100vh;}
  }
</style>
</head>

<script>
/* ====== CONFIG ====== */
// ▼▼▼ 여기에 Apps Script 웹앱 배포 URL을 붙여넣으세요 ▼▼▼
const SHEET_API = "https://script.google.com/macros/s/AKfycbxws5e_c2oMyeSz7svuHCrIJvsvLSZqcHyIXQM3RNPyHVLVQFrs9j0Z4_CCtwqm3VQ4Yg/exec";
// ▲▲▲ 예: https://script.google.com/macros/s/AKfy.../exec ▲▲▲

const ADMIN_PIN = "0000";        // 관리자 비밀번호 (원하면 바꾸세요)
const REFRESH_MS = 120000;       // 주기적 갱신 주기 (밀리초). 120000 = 2분
const PLANS = {
  period: ["1개월권","3개월권","6개월권","주2회권","주3회권"],
  count:  ["10회권","20회권","30회권","PT 10회","PT 20회"]
};

/* ====== STATE ====== */
let members = [];                // 시트에서 받아온 회원 명단 (캐시)
let kInput = "";
let gInput = "";
let resultTimer = null;
let planType = "period";
let lastSync = 0;
let apiReady = false;            // SHEET_API가 설정됐는지

/* ====== SHEET API ====== */
function apiConfigured(){
  return SHEET_API && SHEET_API.indexOf("PASTE_YOUR") === -1 && SHEET_API.indexOf("script.google.com") !== -1;
}

/* 시트에서 전체 명단을 받아와 캐시 갱신 */
async function fetchMembers(){
  if(!apiConfigured()) return false;
  try{
    const res = await fetch(SHEET_API, {method:"GET"});
    const data = await res.json();
    if(data.ok && Array.isArray(data.members)){
      members = data.members;
      lastSync = Date.now();
      setSync("ok");
      return true;
    }
    setSync("err"); return false;
  }catch(e){ setSync("err"); return false; }
}

/* 시트에 변경 요청 (add/update/delete/use). 성공 시 캐시도 재동기화 */
async function apiPost(payload){
  if(!apiConfigured()){ toast("시트 URL이 설정되지 않았습니다"); return null; }
  setSync("sync");
  try{
    const res = await fetch(SHEET_API, {
      method:"POST",
      // Apps Script는 text/plain 본문이면 preflight 없이 통과합니다
      headers:{"Content-Type":"text/plain;charset=utf-8"},
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    if(!data.ok){ toast("시트 처리 실패: "+(data.error||"")); setSync("err"); return null; }
    await fetchMembers();   // 변경 후 최신 명단으로 갱신
    return data;
  }catch(e){ toast("네트워크 오류 — 다시 시도하세요"); setSync("err"); return null; }
}

/* 동기화 상태 점 표시 */
function setSync(state){
  const el = document.getElementById("syncDot");
  if(!el) return;
  el.className = "sync-dot " + state;
  const label = {ok:"동기화됨", sync:"저장 중…", err:"연결 끊김", off:"오프라인"};
  el.title = label[state] || "";
}

/* ====== HELPERS ====== */
const $ = s => document.querySelector(s);
const pad2 = n => String(n).padStart(2,"0");
function todayStr(){ const d=new Date(); return d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate()); }
function last4(phone){ const d=(phone||"").replace(/\D/g,""); return d.slice(-4); }
function addMonths(dateStr, m){
  const d = new Date(dateStr+"T00:00:00");
  d.setMonth(d.getMonth()+parseInt(m,10));
  return d;
}
function daysBetween(a,b){ return Math.round((b-a)/(1000*60*60*24)); }

/* status for a member -> {kind, daysLeft, endDate} */
function memberStatus(m){
  if(m.type==="period"){
    const end = addMonths(m.start, m.months);
    const now = new Date(); now.setHours(0,0,0,0);
    const left = daysBetween(now, end);
    let kind = "ok";
    if(left < 0) kind = "exp";
    else if(left <= 7) kind = "warn";
    return {kind, daysLeft:left, end};
  } else {
    const left = m.total - (m.used||0);
    let kind = "ok";
    if(left <= 0) kind = "exp";
    else if(left <= 3) kind = "warn";
    return {kind, countLeft:left};
  }
}

function toast(msg){
  const t=$("#toast"); t.textContent=msg; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),1800);
}

/* ====== KEYPAD BUILDER ====== */
function buildKeys(container, onDigit, onClear, onBack){
  container.innerHTML="";
  const layout=[1,2,3,4,5,6,7,8,9,"clear",0,"back"];
  layout.forEach(v=>{
    const b=document.createElement("div");
    b.className="key";
    if(v==="clear"){b.classList.add("util");b.textContent="↻";b.onclick=onClear;}
    else if(v==="back"){b.classList.add("util");b.textContent="←";b.onclick=onBack;}
    else{b.textContent=v;b.onclick=()=>onDigit(String(v));}
    container.appendChild(b);
  });
}
function renderDots(el, len){
  el.innerHTML="";
  for(let i=0;i<4;i++){
    const d=document.createElement("div");
    d.className="dot"+(i<len?" filled":"");
    el.appendChild(d);
  }
}

/* ====== KIOSK ====== */
function kRender(){ renderDots($("#display"), kInput.length); $("#submitBtn").disabled = kInput.length!==4; }
function kDigit(d){ if(kInput.length<4){ kInput+=d; kRender(); } }
function kClear(){ kInput=""; kRender(); }
function kBack(){ kInput=kInput.slice(0,-1); kRender(); }

async function kSubmit(){
  if(kInput.length!==4) return;
  const code = kInput;
  kClear();
  let matches = members.filter(m=>last4(m.phone)===code);
  // 캐시에 없으면 시트를 한 번 더 확인 (방금 등록한 회원 대비)
  if(matches.length===0 && apiConfigured()){
    showLoadingResult();
    await fetchMembers();
    matches = members.filter(m=>last4(m.phone)===code);
  }
  showResult(matches, code);
}

function showLoadingResult(){
  const view=$("#resultView");
  view.innerHTML=`<div class="card"><div class="r-big" style="font-size:28px;color:var(--muted)">확인 중…</div></div>`;
  view.classList.remove("hidden");
}

function showResult(matches, code){
  const view=$("#resultView");
  let html="";
  if(matches.length===0){
    html = `<div class="card r-notfound">
      <div class="r-big">등록 정보 없음</div>
      <div class="r-meta">뒤 4자리 <b>${code}</b> 회원을 찾을 수 없습니다.<br>데스크에 문의해 주세요.</div>
      <div class="r-close">화면을 누르면 닫힙니다</div></div>`;
  } else {
    // if multiple share last4, show each compactly; usually 1
    const m = matches[0];
    const st = memberStatus(m);
    let big, statusCls, statusTxt, meta="", bar="";
    if(m.type==="period"){
      const end=st.end;
      const endStr=end.getFullYear()+"."+pad2(end.getMonth()+1)+"."+pad2(end.getDate());
      if(st.kind==="exp"){
        big=`<div class="r-big" style="color:var(--red)">만료됨</div>`;
        statusCls="s-exp"; statusTxt=`${-st.daysLeft}일 지남`;
      } else {
        big=`<div class="r-big">${st.daysLeft}<span class="unit">일 남음</span></div>`;
        statusCls = st.kind==="warn"?"s-warn":"s-ok";
        statusTxt = st.kind==="warn"?"곧 만료 — 연장 안내":"이용중";
      }
      meta=`만료일 ${endStr}`;
      const totalDays = Math.max(daysBetween(new Date(m.start+"T00:00:00"), end),1);
      const pct = Math.max(0, Math.min(100, Math.round((Math.max(st.daysLeft,0)/totalDays)*100)));
      const barColor = st.kind==="exp"?"var(--red)":st.kind==="warn"?"var(--amber)":"var(--lime)";
      bar=`<div class="r-bar"><i style="width:${pct}%;background:${barColor}"></i></div>`;
    } else {
      if(st.kind==="exp"){
        big=`<div class="r-big" style="color:var(--red)">소진됨</div>`;
        statusCls="s-exp"; statusTxt="잔여 0회";
      } else {
        big=`<div class="r-big">${st.countLeft}<span class="unit">회 남음</span></div>`;
        statusCls=st.kind==="warn"?"s-warn":"s-ok";
        statusTxt=st.kind==="warn"?"곧 소진 — 연장 안내":"이용중";
      }
      meta=`총 ${m.total}회 중 ${m.used||0}회 사용`;
      const pct=Math.max(0,Math.min(100,Math.round((st.countLeft/m.total)*100)));
      const barColor = st.kind==="exp"?"var(--red)":st.kind==="warn"?"var(--amber)":"var(--lime)";
      bar=`<div class="r-bar"><i style="width:${pct}%;background:${barColor}"></i></div>`;
    }
    html=`<div class="card">
      <div class="r-name">${m.name}</div>
      <div class="r-plan">${m.plan}</div>
      ${big}
      ${bar}
      <div><span class="r-status ${statusCls}">${statusTxt}</span></div>
      <div class="r-meta">${meta}</div>
      <div class="r-close">화면을 누르면 닫힙니다</div>
    </div>`;
  }
  view.innerHTML=html;
  view.classList.remove("hidden");
  clearTimeout(resultTimer);
  resultTimer=setTimeout(closeResult, 7000);
}
function closeResult(){ $("#resultView").classList.add("hidden"); clearTimeout(resultTimer); }

/* ====== ADMIN GATE ====== */
function gRender(){ renderDots($("#gateDisplay"), gInput.length); }
function gDigit(d){
  if(gInput.length<4){ gInput+=d; gRender(); }
  if(gInput.length===4){
    setTimeout(()=>{
      if(gInput===ADMIN_PIN){ gInput=""; gRender(); openAdmin(); }
      else { toast("비밀번호가 틀렸습니다"); gInput=""; gRender(); }
    },120);
  }
}
function gClear(){ gInput=""; gRender(); }
function gBack(){ gInput=gInput.slice(0,-1); gRender(); }

/* ====== VIEW SWITCH ====== */
function openGate(){ $("#gateView").classList.remove("hidden"); gInput=""; gRender(); }
function closeGate(){ $("#gateView").classList.add("hidden"); }
function openAdmin(){ closeGate(); $("#kioskView").classList.add("hidden"); $("#gearBtn").classList.add("hidden"); $("#adminView").classList.remove("hidden"); renderTable(); }
function closeAdmin(){ $("#adminView").classList.add("hidden"); $("#kioskView").classList.remove("hidden"); $("#gearBtn").classList.remove("hidden"); resetForm(); }

/* ====== FORM ====== */
function fillPlanOptions(){
  const sel=$("#fPlan"); sel.innerHTML="";
  PLANS[planType].forEach(p=>{ const o=document.createElement("option"); o.value=p; o.textContent=p; sel.appendChild(o); });
}
function setPlanType(t){
  planType=t;
  document.querySelectorAll("#planTypeSeg button").forEach(b=>b.classList.toggle("on", b.dataset.type===t));
  fillPlanOptions();
  $("#startField").classList.toggle("hidden", t!=="period");
  $("#periodField").classList.toggle("hidden", t!=="period");
  $("#countField").classList.toggle("hidden", t!=="count");
}
function resetForm(){
  $("#editId").value=""; $("#fName").value=""; $("#fPhone").value="";
  $("#fStart").value=todayStr(); $("#fMonths").value="3"; $("#fCount").value="20";
  setPlanType("period");
  $("#formTitle").textContent="회원 등록"; $("#saveBtn").textContent="등록하기";
}
async function saveMember(){
  const name=$("#fName").value.trim();
  const phone=$("#fPhone").value.trim();
  const plan=$("#fPlan").value;
  if(!name){ toast("이름을 입력하세요"); return; }
  if(last4(phone).length<4){ toast("전화번호를 정확히 입력하세요"); return; }
  const id=$("#editId").value;
  const base={ name, phone, plan, type:planType };
  if(planType==="period"){
    base.start=$("#fStart").value||todayStr();
    base.months=parseInt($("#fMonths").value||"1",10);
    base.total=null;
  } else {
    base.total=parseInt($("#fCount").value||"1",10);
    base.used = id ? (members.find(m=>m.id===id)?.used||0) : 0;
    base.start=""; base.months=null;
  }
  $("#saveBtn").disabled=true;
  if(id){
    base.id=id;
    const r=await apiPost({action:"update", member:base});
    if(r){ toast("수정되었습니다"); resetForm(); renderTable(); }
  } else {
    const r=await apiPost({action:"add", member:base});
    if(r){ toast("등록되었습니다"); resetForm(); renderTable(); }
  }
  $("#saveBtn").disabled=false;
}
function editMember(id){
  const m=members.find(x=>x.id===id); if(!m) return;
  $("#editId").value=m.id; $("#fName").value=m.name; $("#fPhone").value=m.phone;
  setPlanType(m.type); $("#fPlan").value=m.plan;
  if(m.type==="period"){ $("#fStart").value=m.start; $("#fMonths").value=m.months; }
  else { $("#fCount").value=m.total; }
  $("#formTitle").textContent="회원 수정"; $("#saveBtn").textContent="수정 저장";
  window.scrollTo({top:0,behavior:"smooth"});
}
async function delMember(id){
  const m=members.find(x=>x.id===id);
  if(!confirm((m?m.name:"이 회원")+" 님의 등록을 취소(삭제)할까요?")) return;
  const r=await apiPost({action:"delete", id:id});
  if(r){ renderTable(); toast("등록이 취소되었습니다"); }
}
async function useOne(id){
  const m=members.find(x=>x.id===id); if(!m||m.type!=="count") return;
  if((m.used||0) >= m.total){ toast("잔여 횟수가 없습니다"); return; }
  const r=await apiPost({action:"use", id:id});
  if(r){ renderTable(); toast(m.name+" 1회 차감"); }
}

/* ====== TABLE ====== */
function renderTable(){
  const q=$("#searchInput").value.trim().replace(/\s/g,"");
  let list=members.slice().sort((a,b)=>a.name.localeCompare(b.name,"ko"));
  if(q){ list=list.filter(m=> m.name.replace(/\s/g,"").includes(q) || (m.phone||"").replace(/\D/g,"").includes(q.replace(/\D/g,""))); }
  $("#memCount").textContent=members.length+"명";
  const wrap=$("#tableWrap");
  if(list.length===0){ wrap.innerHTML=`<div class="empty">${members.length===0?"아직 등록된 회원이 없습니다":"검색 결과가 없습니다"}</div>`; return; }
  let rows="";
  list.forEach(m=>{
    const st=memberStatus(m);
    let pillCls,pillTxt,leftTxt;
    if(m.type==="period"){
      if(st.kind==="exp"){pillCls="p-exp";pillTxt="만료";leftTxt=`${-st.daysLeft}일 지남`;}
      else{pillCls=st.kind==="warn"?"p-warn":"p-ok";pillTxt=st.kind==="warn"?"임박":"이용중";leftTxt=`${st.daysLeft}일`;}
    } else {
      if(st.kind==="exp"){pillCls="p-exp";pillTxt="소진";leftTxt="0회";}
      else{pillCls=st.kind==="warn"?"p-warn":"p-ok";pillTxt=st.kind==="warn"?"임박":"이용중";leftTxt=`${st.countLeft}회`;}
    }
    const useBtn = m.type==="count" ? `<button title="1회 차감" onclick="useOne('${m.id}')">−1</button>` : "";
    rows+=`<tr>
      <td><div class="m-name">${m.name}</div><div class="m-phone">${m.phone||""}</div></td>
      <td>${m.plan}</td>
      <td><b>${leftTxt}</b></td>
      <td><span class="pill ${pillCls}">${pillTxt}</span></td>
      <td><div class="act">${useBtn}<button title="수정" onclick="editMember('${m.id}')">✎</button><button class="del" title="삭제" onclick="delMember('${m.id}')">🗑</button></div></td>
    </tr>`;
  });
  wrap.innerHTML=`<table><thead><tr><th>회원</th><th>회원권</th><th>잔여</th><th>상태</th><th></th></tr></thead><tbody>${rows}</tbody></table>`;
}

/* ====== PHONE FORMAT ====== */
function formatPhone(v){
  const d=v.replace(/\D/g,"").slice(0,11);
  if(d.length<4) return d;
  if(d.length<8) return d.slice(0,3)+"-"+d.slice(3);
  return d.slice(0,3)+"-"+d.slice(3,7)+"-"+d.slice(7);
}

/* ====== INIT ====== */
async function init(){
  buildKeys($("#keys"), kDigit, kClear, kBack);
  buildKeys($("#gateKeys"), gDigit, gClear, gBack);
  kRender(); gRender();

  $("#submitBtn").onclick=kSubmit;
  $("#resultView").onclick=closeResult;
  $("#gearBtn").onclick=openGate;
  $("#gateCancel").onclick=closeGate;
  $("#backBtn").onclick=closeAdmin;
  $("#saveBtn").onclick=saveMember;
  $("#searchInput").oninput=renderTable;
  $("#refreshBtn").onclick=async()=>{ setSync("sync"); await fetchMembers(); renderTable(); toast("최신 명단으로 갱신했습니다"); };
  document.querySelectorAll("#planTypeSeg button").forEach(b=> b.onclick=()=>setPlanType(b.dataset.type));
  $("#fPhone").oninput=e=>{ e.target.value=formatPhone(e.target.value); };

  document.addEventListener("keydown", e=>{
    if(!$("#kioskView").classList.contains("hidden") && $("#resultView").classList.contains("hidden") && $("#gateView").classList.contains("hidden")){
      if(/^[0-9]$/.test(e.key)) kDigit(e.key);
      else if(e.key==="Backspace") kBack();
      else if(e.key==="Enter") kSubmit();
      else if(e.key==="Escape") kClear();
    } else if(!$("#resultView").classList.contains("hidden") && e.key){ closeResult(); }
  });

  resetForm();

  let taps=0,tt;
  $("#logoImg").onclick=()=>{ taps++; clearTimeout(tt); tt=setTimeout(()=>taps=0,600); if(taps>=3){taps=0;openGate();} };

  // 시트 연동 시작
  $("#loading").classList.add("hidden");
  $("#gearBtn").classList.remove("hidden");
  if(apiConfigured()){
    setSync("sync");
    await fetchMembers();        // 첫 로딩
    renderTable();
    // 주기적 갱신: 키오스크 화면이고 결과창이 닫혀 있을 때만 갱신
    setInterval(async()=>{
      if($("#resultView").classList.contains("hidden")){
        await fetchMembers();
        if(!$("#adminView").classList.contains("hidden")) renderTable();
      }
    }, REFRESH_MS);
  } else {
    setSync("off");
    toast("시트 URL을 먼저 설정하세요 (코드 상단 SHEET_API)");
  }
}
init();

</script>
</body>
</html>
