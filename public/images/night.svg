<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="nightsky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fde68a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#fde68a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Night sky -->
  <rect width="800" height="400" fill="url(#nightsky)"/>
  <!-- Stars -->
  <circle cx="100" cy="50" r="2" fill="white" opacity="0.8"/>
  <circle cx="250" cy="80" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="400" cy="30" r="2" fill="white" opacity="0.7"/>
  <circle cx="550" cy="70" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="680" cy="40" r="2" fill="white" opacity="0.8"/>
  <circle cx="150" cy="100" r="1" fill="white" opacity="0.4"/>
  <circle cx="720" cy="90" r="1" fill="white" opacity="0.6"/>
  <circle cx="350" cy="60" r="1.5" fill="white" opacity="0.5"/>
  <!-- Moon -->
  <circle cx="680" cy="80" r="35" fill="#fde68a" opacity="0.9"/>
  <circle cx="695" cy="72" r="30" fill="#0f172a"/>
  <!-- City silhouette -->
  <rect x="30" y="180" width="50" height="120" fill="#1e293b"/>
  <rect x="90" y="160" width="40" height="140" fill="#1e293b"/>
  <rect x="620" y="150" width="60" height="150" fill="#1e293b"/>
  <rect x="700" y="170" width="45" height="130" fill="#1e293b"/>
  <rect x="755" y="190" width="45" height="110" fill="#1e293b"/>
  <!-- Building windows lit -->
  <rect x="40" y="190" width="8" height="8" fill="#fde68a" opacity="0.6"/>
  <rect x="60" y="210" width="8" height="8" fill="#fde68a" opacity="0.4"/>
  <rect x="100" y="175" width="8" height="8" fill="#fde68a" opacity="0.5"/>
  <rect x="635" y="165" width="8" height="8" fill="#fde68a" opacity="0.6"/>
  <rect x="655" y="185" width="8" height="8" fill="#fde68a" opacity="0.4"/>
  <rect x="715" y="185" width="8" height="8" fill="#fde68a" opacity="0.5"/>
  <!-- Road -->
  <rect x="0" y="300" width="800" height="100" fill="#334155"/>
  <!-- Street lights -->
  <rect x="180" y="220" width="4" height="82" fill="#64748b"/>
  <circle cx="182" cy="218" r="8" fill="url(#glow)"/>
  <circle cx="182" cy="218" r="3" fill="#fde68a" opacity="0.9"/>
  <rect x="560" y="220" width="4" height="82" fill="#64748b"/>
  <circle cx="562" cy="218" r="8" fill="url(#glow)"/>
  <circle cx="562" cy="218" r="3" fill="#fde68a" opacity="0.9"/>
  <!-- Night bus - owl bus -->
  <rect x="300" y="230" width="200" height="85" rx="10" fill="#1d4ed8"/>
  <rect x="300" y="230" width="200" height="22" rx="10" fill="#1e3a8a"/>
  <rect x="300" y="246" width="200" height="6" fill="#1e3a8a"/>
  <!-- Lit windows - yellow glow -->
  <rect x="315" y="240" width="25" height="28" rx="3" fill="#fef3c7"/>
  <rect x="347" y="240" width="25" height="28" rx="3" fill="#fef3c7"/>
  <rect x="379" y="240" width="25" height="28" rx="3" fill="#fef3c7"/>
  <rect x="411" y="240" width="25" height="28" rx="3" fill="#fef3c7"/>
  <!-- Front -->
  <rect x="448" y="238" width="38" height="40" rx="5" fill="#fef3c7" opacity="0.8"/>
  <!-- Headlights with glow -->
  <circle cx="500" cy="280" r="15" fill="url(#glow)"/>
  <rect x="493" y="274" width="10" height="12" rx="2" fill="#fde68a"/>
  <!-- Wheels -->
  <circle cx="340" cy="320" r="20" fill="#0f172a"/>
  <circle cx="340" cy="320" r="10" fill="#1e293b"/>
  <circle cx="470" cy="320" r="20" fill="#0f172a"/>
  <circle cx="470" cy="320" r="10" fill="#1e293b"/>
  <!-- Sign -->
  <rect x="315" y="233" width="55" height="11" rx="2" fill="#172554"/>
  <text x="342" y="242" font-family="sans-serif" font-size="7" fill="#fde68a" text-anchor="middle">심야버스</text>
  <!-- Lane markings -->
  <rect x="50" y="345" width="35" height="3" rx="1" fill="white" opacity="0.3"/>
  <rect x="150" y="345" width="35" height="3" rx="1" fill="white" opacity="0.3"/>
  <rect x="600" y="345" width="35" height="3" rx="1" fill="white" opacity="0.3"/>
  <rect x="700" y="345" width="35" height="3" rx="1" fill="white" opacity="0.3"/>
</svg>