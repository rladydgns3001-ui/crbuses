<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="100%" stop-color="#bae6fd"/>
    </linearGradient>
    <linearGradient id="road" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#475569"/>
      <stop offset="100%" stop-color="#64748b"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="400" fill="url(#sky)"/>
  <!-- Mountains -->
  <polygon points="0,280 120,160 240,280" fill="#86efac" opacity="0.5"/>
  <polygon points="180,280 340,120 500,280" fill="#4ade80" opacity="0.6"/>
  <polygon points="450,280 600,150 750,280" fill="#86efac" opacity="0.5"/>
  <!-- Road -->
  <rect x="0" y="280" width="800" height="120" fill="url(#road)"/>
  <rect x="0" y="335" width="800" height="6" fill="#fbbf24" opacity="0.8"/>
  <!-- Dashed center line -->
  <line x1="0" y1="338" x2="800" y2="338" stroke="#fbbf24" stroke-width="3" stroke-dasharray="30,20"/>
  <!-- Bus body -->
  <rect x="280" y="210" width="240" height="100" rx="12" fill="#2563eb"/>
  <rect x="280" y="210" width="240" height="30" rx="12" fill="#1d4ed8"/>
  <rect x="280" y="228" width="240" height="12" fill="#1d4ed8"/>
  <!-- Windows -->
  <rect x="295" y="225" width="35" height="30" rx="4" fill="#bfdbfe"/>
  <rect x="340" y="225" width="35" height="30" rx="4" fill="#bfdbfe"/>
  <rect x="385" y="225" width="35" height="30" rx="4" fill="#bfdbfe"/>
  <rect x="430" y="225" width="35" height="30" rx="4" fill="#bfdbfe"/>
  <rect x="475" y="225" width="35" height="30" rx="4" fill="#93c5fd"/>
  <!-- Front windshield -->
  <rect x="475" y="220" width="40" height="45" rx="6" fill="#dbeafe"/>
  <!-- Headlight -->
  <rect x="510" y="275" width="12" height="18" rx="3" fill="#fde68a"/>
  <!-- Wheels -->
  <circle cx="320" cy="315" r="22" fill="#1e293b"/>
  <circle cx="320" cy="315" r="12" fill="#475569"/>
  <circle cx="320" cy="315" r="4" fill="#94a3b8"/>
  <circle cx="480" cy="315" r="22" fill="#1e293b"/>
  <circle cx="480" cy="315" r="12" fill="#475569"/>
  <circle cx="480" cy="315" r="4" fill="#94a3b8"/>
  <!-- Destination sign -->
  <rect x="295" y="214" width="80" height="14" rx="2" fill="#1e40af"/>
  <text x="335" y="225" font-family="sans-serif" font-size="9" fill="white" text-anchor="middle">시외버스</text>
  <!-- Road markings -->
  <rect x="50" y="350" width="40" height="4" rx="2" fill="white" opacity="0.6"/>
  <rect x="150" y="350" width="40" height="4" rx="2" fill="white" opacity="0.6"/>
  <rect x="600" y="350" width="40" height="4" rx="2" fill="white" opacity="0.6"/>
  <rect x="700" y="350" width="40" height="4" rx="2" fill="white" opacity="0.6"/>
  <!-- Speed lines -->
  <line x1="200" y1="260" x2="250" y2="260" stroke="#93c5fd" stroke-width="2" opacity="0.6"/>
  <line x1="180" y1="270" x2="240" y2="270" stroke="#93c5fd" stroke-width="2" opacity="0.4"/>
  <line x1="210" y1="280" x2="260" y2="280" stroke="#93c5fd" stroke-width="1.5" opacity="0.3"/>
</svg>