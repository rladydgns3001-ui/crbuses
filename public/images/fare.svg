<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg7" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="100%" stop-color="#dcfce7"/>
    </linearGradient>
    <linearGradient id="card1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="card2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg7)"/>
  <!-- T-money card -->
  <g transform="translate(150,80) rotate(-8)">
    <rect width="240" height="150" rx="12" fill="url(#card1)"/>
    <rect x="15" y="15" width="45" height="35" rx="5" fill="#fbbf24"/>
    <rect x="20" y="22" width="12" height="8" rx="1" fill="#f59e0b"/>
    <rect x="35" y="22" width="12" height="8" rx="1" fill="#f59e0b"/>
    <rect x="20" y="35" width="12" height="8" rx="1" fill="#f59e0b"/>
    <text x="15" y="80" font-family="sans-serif" font-size="14" fill="white" font-weight="bold">T-money</text>
    <text x="15" y="100" font-family="sans-serif" font-size="10" fill="#bfdbfe">교통카드</text>
    <text x="15" y="135" font-family="sans-serif" font-size="11" fill="#93c5fd">**** **** **** 1234</text>
  </g>
  <!-- Cashbee card -->
  <g transform="translate(420,120) rotate(5)">
    <rect width="240" height="150" rx="12" fill="url(#card2)"/>
    <rect x="15" y="15" width="45" height="35" rx="5" fill="#fbbf24"/>
    <rect x="20" y="22" width="12" height="8" rx="1" fill="#f59e0b"/>
    <rect x="35" y="22" width="12" height="8" rx="1" fill="#f59e0b"/>
    <rect x="20" y="35" width="12" height="8" rx="1" fill="#f59e0b"/>
    <text x="15" y="80" font-family="sans-serif" font-size="14" fill="white" font-weight="bold">Cashbee</text>
    <text x="15" y="100" font-family="sans-serif" font-size="10" fill="#bbf7d0">캐시비</text>
    <text x="15" y="135" font-family="sans-serif" font-size="11" fill="#86efac">**** **** **** 5678</text>
  </g>
  <!-- Coins -->
  <circle cx="380" cy="320" r="30" fill="#fbbf24" opacity="0.8"/>
  <circle cx="380" cy="320" r="22" fill="#f59e0b" opacity="0.6"/>
  <text x="380" y="326" font-family="sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">₩</text>
  <circle cx="430" cy="340" r="25" fill="#fbbf24" opacity="0.7"/>
  <circle cx="430" cy="340" r="18" fill="#f59e0b" opacity="0.5"/>
  <text x="430" y="345" font-family="sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="bold">₩</text>
  <!-- Discount badge -->
  <circle cx="650" cy="80" r="45" fill="#ef4444"/>
  <text x="650" y="75" font-family="sans-serif" font-size="13" fill="white" text-anchor="middle" font-weight="bold">할인</text>
  <text x="650" y="93" font-family="sans-serif" font-size="18" fill="#fde68a" text-anchor="middle" font-weight="bold">20%</text>
  <!-- Transfer arrow -->
  <g transform="translate(200,310)">
    <rect width="120" height="35" rx="18" fill="#2563eb" opacity="0.15"/>
    <text x="40" y="23" font-family="sans-serif" font-size="11" fill="#2563eb" font-weight="600">환승 할인</text>
    <polygon points="110,17 125,17 117,25" fill="#2563eb" opacity="0.6"/>
  </g>
</svg>