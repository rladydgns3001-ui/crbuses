  <line x1="0" y1="340" x2="800" y2="340" stroke="white" stroke-width="1.5" stroke-dasharray="20,15"/>
  <!-- Small village bus -->
  <rect x="320" y="240" width="160" height="65" rx="10" fill="#16a34a"/>
  <rect x="320" y="240" width="160" height="18" rx="10" fill="#15803d"/>
  <rect x="320" y="253" width="160" height="5" fill="#15803d"/>
  <!-- Windows -->
  <rect x="335" y="250" width="22" height="22" rx="3" fill="#dcfce7"/>
  <rect x="363" y="250" width="22" height="22" rx="3" fill="#dcfce7"/>
