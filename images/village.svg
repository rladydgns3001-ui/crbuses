  <circle cx="355" cy="310" r="16" fill="#1e293b"/>
  <circle cx="355" cy="310" r="8" fill="#475569"/>
  <circle cx="450" cy="310" r="16" fill="#1e293b"/>
  <circle cx="450" cy="310" r="8" fill="#475569"/>
