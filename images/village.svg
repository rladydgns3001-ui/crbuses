  <ellipse cx="650" cy="290" rx="180" ry="50" fill="#bbf7d0" opacity="0.4"/>
  <!-- Houses -->
  <rect x="80" y="200" width="55" height="50" rx="2" fill="#fed7aa"/>
  <polygon points="80,200 107,175 135,200" fill="#f97316" opacity="0.7"/>
  <rect x="95" y="220" width="15" height="30" rx="1" fill="#fbbf24"/>
  <rect x="660" y="190" width="50" height="55" rx="2" fill="#fbcfe8"/>
