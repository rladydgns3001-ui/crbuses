<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg10" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffbeb"/>
      <stop offset="100%" stop-color="#fef3c7"/>
    </linearGradient>
    <linearGradient id="phone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg10)"/>
  <!-- Light bulb -->
  <g transform="translate(350,30)">
    <circle cx="50" cy="60" r="50" fill="#fbbf24" opacity="0.15"/>
    <circle cx="50" cy="60" r="35" fill="#fbbf24" opacity="0.25"/>
    <path d="M35,55 Q35,25 50,20 Q65,25 65,55 Q65,70 60,75 L40,75 Q35,70 35,55" fill="#fbbf24"/>
    <rect x="40" y="75" width="20" height="8" rx="2" fill="#f59e0b"/>
    <rect x="42" y="83" width="16" height="3" rx="1" fill="#d97706"/>
    <rect x="44" y="86" width="12" height="3" rx="1" fill="#d97706"/>
    <!-- Light rays -->
    <line x1="50" y1="0" x2="50" y2="10" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
    <line x1="20" y1="15" x2="28" y2="23" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
    <line x1="80" y1="15" x2="72" y2="23" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
    <line x1="5" y1="55" x2="15" y2="55" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
    <line x1="95" y1="55" x2="85" y2="55" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- Phone with bus app -->
  <g transform="translate(130,120)">
    <rect width="110" height="200" rx="14" fill="url(#phone)"/>
    <rect x="8" y="30" width="94" height="145" rx="4" fill="white"/>
    <!-- App header -->
    <rect x="8" y="30" width="94" height="25" rx="4" fill="#2563eb"/>
    <text x="55" y="47" font-family="sans-serif" font-size="9" fill="white" text-anchor="middle">버스 정보</text>
    <!-- App content -->
    <rect x="14" y="62" width="82" height="18" rx="3" fill="#eff6ff"/>
    <text x="55" y="74" font-family="sans-serif" font-size="7" fill="#2563eb" text-anchor="middle">370번 · 3분 후 도착</text>
    <rect x="14" y="86" width="82" height="18" rx="3" fill="#f0fdf4"/>
    <text x="55" y="98" font-family="sans-serif" font-size="7" fill="#16a34a" text-anchor="middle">740번 · 8분 후 도착</text>
    <rect x="14" y="110" width="82" height="18" rx="3" fill="#fef2f2"/>
    <text x="55" y="122" font-family="sans-serif" font-size="7" fill="#dc2626" text-anchor="middle">9701번 · 15분 후 도착</text>
    <!-- Map area -->
    <rect x="14" y="134" width="82" height="35" rx="3" fill="#e5e7eb"/>
    <circle cx="45" cy="151" r="5" fill="#2563eb" opacity="0.6"/>
    <circle cx="70" cy="145" r="4" fill="#16a34a" opacity="0.5"/>
    <line x1="45" y1="151" x2="70" y2="145" stroke="#6b7280" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- Home button -->
    <circle cx="55" cy="195" r="6" stroke="#475569" stroke-width="1.5" fill="none"/>
  </g>
  <!-- Seat selection diagram -->
  <g transform="translate(520,130)">
    <rect width="180" height="200" rx="8" fill="white" stroke="#e5e7eb" stroke-width="1"/>
    <text x="90" y="25" font-family="sans-serif" font-size="11" fill="#1e293b" text-anchor="middle" font-weight="bold">좌석 선택</text>
    <!-- Seat grid -->
    <rect x="20" y="40" width="28" height="24" rx="4" fill="#bbf7d0" stroke="#16a34a" stroke-width="1"/>
    <rect x="56" y="40" width="28" height="24" rx="4" fill="#e5e7eb"/>
    <rect x="96" y="40" width="28" height="24" rx="4" fill="#e5e7eb"/>
    <rect x="132" y="40" width="28" height="24" rx="4" fill="#e5e7eb"/>
    <rect x="20" y="72" width="28" height="24" rx="4" fill="#e5e7eb"/>
    <rect x="56" y="72" width="28" height="24" rx="4" fill="#fecaca" stroke="#ef4444" stroke-width="1"/>
    <rect x="96" y="72" width="28" height="24" rx="4" fill="#e5e7eb"/>
    <rect x="132" y="72" width="28" height="24" rx="4" fill="#e5e7eb"/>
    <rect x="20" y="104" width="28" height="24" rx="4" fill="#e5e7eb"/>
    <rect x="56" y="104" width="28" height="24" rx="4" fill="#e5e7eb"/>
    <rect x="96" y="104" width="28" height="24" rx="4" fill="#bbf7d0" stroke="#16a34a" stroke-width="1"/>
    <rect x="132" y="104" width="28" height="24" rx="4" fill="#e5e7eb"/>
    <!-- Legend -->
    <rect x="20" y="145" width="12" height="12" rx="2" fill="#bbf7d0" stroke="#16a34a" stroke-width="1"/>
    <text x="38" y="155" font-family="sans-serif" font-size="8" fill="#6b7280">추천</text>
    <rect x="70" y="145" width="12" height="12" rx="2" fill="#e5e7eb"/>
    <text x="88" y="155" font-family="sans-serif" font-size="8" fill="#6b7280">빈 좌석</text>
    <rect x="125" y="145" width="12" height="12" rx="2" fill="#fecaca" stroke="#ef4444" stroke-width="1"/>
    <text x="143" y="155" font-family="sans-serif" font-size="8" fill="#6b7280">예약됨</text>
    <!-- Tip badge -->
    <circle cx="160" cy="10" r="15" fill="#f59e0b"/>
    <text x="160" y="14" font-family="sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="bold">TIP</text>
  </g>
  <!-- Checklist -->
  <g transform="translate(310,180)">
    <rect width="170" height="150" rx="8" fill="white" stroke="#e5e7eb" stroke-width="1"/>
    <text x="85" y="25" font-family="sans-serif" font-size="11" fill="#1e293b" text-anchor="middle" font-weight="bold">체크리스트</text>
    <rect x="15" y="38" width="14" height="14" rx="3" fill="#bbf7d0" stroke="#16a34a" stroke-width="1"/>
    <text x="19" y="49" font-family="sans-serif" font-size="10" fill="#16a34a">✓</text>
    <text x="38" y="49" font-family="sans-serif" font-size="9" fill="#374151">교통카드 충전</text>
    <rect x="15" y="60" width="14" height="14" rx="3" fill="#bbf7d0" stroke="#16a34a" stroke-width="1"/>
    <text x="19" y="71" font-family="sans-serif" font-size="10" fill="#16a34a">✓</text>
    <text x="38" y="71" font-family="sans-serif" font-size="9" fill="#374151">노선 확인</text>
    <rect x="15" y="82" width="14" height="14" rx="3" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1"/>
    <text x="38" y="93" font-family="sans-serif" font-size="9" fill="#374151">좌석 예매</text>
    <rect x="15" y="104" width="14" height="14" rx="3" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1"/>
    <text x="38" y="115" font-family="sans-serif" font-size="9" fill="#374151">시간표 확인</text>
  </g>
</svg>